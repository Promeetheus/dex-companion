services:
  - type: web
    name: dex
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn companion_web:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: 5NrdYUN6VHL5hLDZRA3f
      - key: PYTHON_VERSION
        value: 3.11.9
